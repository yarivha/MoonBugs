name: Release

# Build native binaries for Linux, macOS (Intel + Apple Silicon) and Windows,
# then publish them as a GitHub Release. Triggered by pushing a version tag
# (e.g. `git tag v0.1.0 && git push origin v0.1.0`). The `workflow_dispatch`
# entry lets you run the build manually (without publishing a release).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-13      # Intel
            label: macos-x86_64
          - os: macos-14      # Apple Silicon
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      # miniquad (X11/OpenGL) + quad-snd (ALSA) need these dev headers on Linux.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Build release
        run: cargo build --release

      # ---- Package per platform into a single uploadable archive ----------
      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST="moonbugs-${{ github.ref_name }}-${{ matrix.label }}"
          mkdir -p "$DIST"
          cp target/release/moonbugs "$DIST/"
          cp README.md "$DIST/"
          cp packaging/moonbugs.desktop "$DIST/"
          cp assets/icon.png "$DIST/moonbugs.png"
          cp tools/install_linux.sh "$DIST/"
          tar -czf "$DIST.tar.gz" "$DIST"
          echo "ASSET=$DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DIST="moonbugs-${{ github.ref_name }}-${{ matrix.label }}"
          ./tools/bundle_macos.sh
          # ditto preserves the .app bundle structure inside the zip.
          ditto -c -k --keepParent dist/MoonBugs.app "$DIST.zip"
          echo "ASSET=$DIST.zip" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "moonbugs-${{ github.ref_name }}-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item target/release/moonbugs.exe $dist/
          Copy-Item README.md $dist/
          Compress-Archive -Path "$dist/*" -DestinationPath "$dist.zip" -Force
          "ASSET=$dist.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonbugs-${{ matrix.label }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
